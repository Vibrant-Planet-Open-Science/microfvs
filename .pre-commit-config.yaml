repos:
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.30.1
  hooks:
    - id: gitleaks
      entry: gitleaks detect --source . --redact --verbose
      pass_filenames: false
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.13
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v2.1.0
  hooks:
    - id: mypy
      additional_dependencies: ["types-requests", "sqlalchemy[mypy]==2.0"]