name: Pytest with Docker

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vibrant-planet-open-science/usfs-fvs:FS2026.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python runtime
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-pip python3-venv
          python3 -m venv /opt/venv
          echo /opt/venv/bin >> "$GITHUB_PATH"

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests inside container
        run: python -m pytest .

  nbval:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vibrant-planet-open-science/usfs-fvs:FS2026.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python runtime
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-pip python3-venv
          python3 -m venv /opt/venv
          echo /opt/venv/bin >> "$GITHUB_PATH"

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e .

      - name: Run nbval-lax on changed notebooks
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          uvicorn microfvs.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 30); do
            wget -q --spider http://localhost:8000/version 2>/dev/null && break
            sleep 1
          done

          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          mapfile -d '' -t notebooks < <(
            git diff -z --name-only --diff-filter=AM "${BASE_SHA}...${HEAD_SHA}" -- '*.ipynb'
          )

          if [ "${#notebooks[@]}" -eq 0 ]; then
            echo "No notebooks changed in this PR; skipping nbval."
            exit 0
          fi

          printf 'Changed notebooks:\n'
          printf -- ' - %s\n' "${notebooks[@]}"

          python -m pytest --nbval-lax "${notebooks[@]}"
