name: Lint PR Title

# This repo squash-merges, so the PR title becomes the commit subject on main.
# Release Please reads those subjects to compute the changelog and semver bump,
# so PR titles must follow Conventional Commits (feat:, fix:, feat!:, ...).

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read   # read the PR title only; no code is checked out

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.repository == 'Vibrant-Planet-Open-Science/microfvs'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with the changelog-sections in release-please-config.json.
          types: |
            feat
            fix
            deps
            perf
            docs
            build
            refactor
            ci
            test
            chore
